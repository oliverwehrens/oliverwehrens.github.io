    <h2 class="subtitle is-6">February 11, 2009</h2>
    <h1 class="title">IntelliJ IDEA 8.1</h1>
    
    <div class="content">
      <p>I do love IntelliJ IDEA  but the 8.0 release had some issues with indexing and compiler caches.
Version <a href="http://www.jetbrains.com/idea/features/newfeatures.html">8.1</a> is out  and addresses these issues (among other things, e.g. git support). Hurray.</p>
